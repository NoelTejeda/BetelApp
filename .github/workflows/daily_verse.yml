name: Daily Verse Push (Spark Free Plan)
on:
  schedule:
    - cron: '0 11 * * *' # 7:00 AM Caracas (UTC-4)
  workflow_dispatch: # Botón para probarlo manualmente

jobs:
  send_push:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Send Notification
        run: |
          # 1. Obtener día del año
          DAY=$(date +%j | sed 's/^0*//')
          
          # 2. Obtener Versículo de YouVersion
          # Usa el secreto YV_TOKEN que ya tienes configurado
          VOTD=$(curl -s -H "X-YVP-App-Key: ${{ secrets.YV_TOKEN }}" -H "Accept: application/json" "https://api.youversion.com/v1/verse_of_the_days/$DAY")
          PASSAGE_ID=$(echo $VOTD | jq -r '.passage_id')
          
          # 3. Obtener Texto y Referencia (Mejoramos la extracción para evitar null)
          PASSAGE=$(curl -s -H "X-YVP-App-Key: ${{ secrets.YV_TOKEN }}" -H "Accept: application/json" "https://api.youversion.com/v1/bibles/147/passages/$PASSAGE_ID")
          
          # Extraemos el contenido tratando de ser más precisos con JQ
          TEXT_RAW=$(echo $PASSAGE | jq -r '.content // .text // "Bendiciones para ti"')
          TEXT=$(echo $TEXT_RAW | sed 's/<[^>]*>//g' | tr -d '\n' | tr -d '\r')
          REF=$(echo $PASSAGE | jq -r '.reference // .display // ""')

          # 4. Enviar directamente a Firebase usando un script de Node.js
          echo "const admin = require('firebase-admin');
          const serviceAccount = JSON.parse(process.env.FIREBASE_KEY);
          admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });
          
          const message = {
            notification: { 
              title: '✨ Dios te dice hoy:', 
              body: \`\"\${process.env.TEXT}\" (\${process.env.REF})\`,
              image: 'https://images.unsplash.com/photo-1504052434569-70ad5836ab65?q=80&w=1000&auto=format&fit=crop' // Imagen de fondo profesional
            },
            android: { 
              priority: 'high', 
              notification: { 
                channelId: 'daily_verse_channel', 
                priority: 'max',
                color: '#D32F2F',
                sticky: false,
                visibility: 'public'
              } 
            },
            topic: 'diario'
          };
          
          admin.messaging().send(message)
            .then(() => console.log('✅ Notificación premium enviada'))
            .catch((e) => { console.error(e); process.exit(1); });" > script.js

          npm install firebase-admin
          export FIREBASE_KEY='${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          export TEXT="$TEXT"
          export REF="$REF"
          node script.js
