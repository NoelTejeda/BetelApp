name: Daily Verse Push (Spark Free Plan)
on:
  schedule:
    - cron: '0 11 * * *' # 7:00 AM Caracas (UTC-4)
  workflow_dispatch: # Botón para probarlo manualmente

jobs:
  send_push:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Send Notification
        run: |
          # 1. Diagnóstico de variables
          DAY=$(date +%j | sed 's/^0*//')
          echo "Día del año: $DAY"
          if [ -z "${{ secrets.YV_TOKEN }}" ]; then echo "❌ ERROR: El secreto YV_TOKEN está vacío en GitHub"; fi
          
          # 2. Consultar YouVersion (Verbose para ver errores)
          RESPONSE=$(curl -L -v -H "X-YouVersion-Developer-Token: ${{ secrets.YV_TOKEN }}" -H "Accept: application/json" "https://api.youversion.com/v1/moments/verse-of-the-day?day=$DAY&version_id=147" 2>&1)
          
          # IMPRIMIR RESPUESTA PARA DEPURAR
          echo "DEBUG - FULL OUTPUT: $RESPONSE"
          
          # Extraemos texto (si existe en la respuesta)
          TEXT=$(echo "$RESPONSE" | grep -o '\"content\":\"[^\"]*\"' | cut -d'\"' -f4 || echo "Versículo del Día")
          REF=$(echo "$RESPONSE" | grep -o '\"reference\":\"[^\"]*\"' | cut -d'\"' -f4 || echo "Biblia")

          # 4. Enviar directamente a Firebase usando un script de Node.js
          echo "const admin = require('firebase-admin');
          const serviceAccount = JSON.parse(process.env.FIREBASE_KEY);
          admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });
          
          const message = {
            notification: { 
              title: '✨ Dios te dice hoy:', 
              body: \`\"\${process.env.TEXT}\" (\${process.env.REF})\`,
              image: 'https://images.unsplash.com/photo-1504052434569-70ad5836ab65?q=80&w=1000&auto=format&fit=crop'
            },
            android: { 
              priority: 'high', 
              notification: { 
                channelId: 'daily_verse_channel', 
                priority: 'max',
                color: '#D32F2F',
                visibility: 'public'
              } 
            },
            topic: 'diario'
          };
          
          admin.messaging().send(message)
            .then(() => console.log('✅ Notificación premium enviada'))
            .catch((e) => { console.error(e); process.exit(1); });" > script.js

          npm install firebase-admin
          export FIREBASE_KEY='${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          export TEXT="$TEXT"
          export REF="$REF"
          node script.js
