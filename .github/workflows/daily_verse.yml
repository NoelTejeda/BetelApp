name: Daily Verse Push (Spark Free Plan)
on:
  schedule:
    - cron: '0 11 * * *' # 7:00 AM Caracas (UTC-4)
  workflow_dispatch: # Botón para probarlo manualmente

jobs:
  send_push:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Send Notification
        run: |
          # Todo en uno sincronizado con la lógica de la App
          cat << 'EOF' > run.js
          const admin = require('firebase-admin');
          const axios = require('axios');

          async function start() {
            try {
              const day = new Date().getDOY();
              console.log(`Consultando día: ${day}`);
              const headers = {
                'X-YVP-App-Key': process.env.YV_TOKEN,
                'Accept': 'application/json',
                'User-Agent': 'Mozilla/5.0'
              };
              
              // 1. Obtener ID del Pasaje
              const votdRes = await axios.get(`https://api.youversion.com/v1/verse_of_the_days/${day}`, { headers });
              const passageId = votdRes.data.passage_id || votdRes.data.usfm;
              console.log(`Pasaje ID encontrado: ${passageId}`);

              // 2. Obtener Contenido del Pasaje (RV Antigua - 147)
              const passageRes = await axios.get(`https://api.youversion.com/v1/bibles/147/passages/${passageId}`, { headers });
              const data = passageRes.data;
              const text = (data.content || data.text || "Dios te bendiga hoy").replace(/<[^>]*>/g, "").trim();
              const ref = data.reference || "Biblia";

              // 3. Inicializar Firebase
              const serviceAccount = JSON.parse(process.env.FIREBASE_KEY);
              admin.initializeApp({ credential: admin.credential.cert(serviceAccount) });

              // 4. Enviar Notificación Premium
              const message = {
                notification: { 
                  title: '✨ Dios te dice hoy:', 
                  body: `"${text}" (${ref})`,
                  image: 'https://raw.githubusercontent.com/NoelTejeda/BetelApp/main/assets/images/logo.png' 
                },
                android: { 
                  priority: 'high', 
                  notification: { 
                    channelId: 'daily_verse_channel', 
                    priority: 'max', 
                    color: '#D32F2F', // Rojo Betel
                    visibility: 'public',
                    icon: 'notification_icon', // Referencia al icono de silueta
                    tag: 'daily_verse'
                  } 
                },
                topic: 'diario'
              };

              await admin.messaging().send(message);
              console.log('✅ Notificación enviada con éxito');

            } catch (error) {
              console.error('❌ ERROR:');
              if (error.response) {
                console.error(`Status: ${error.response.status}`);
                console.error('Data:', JSON.stringify(error.response.data));
              } else {
                console.error(error.message);
              }
              process.exit(1);
            }
          }

          Date.prototype.getDOY = function() {
            var start = new Date(this.getFullYear(), 0, 0);
            var diff = this - start;
            var oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
          };

          start();
          EOF

          npm install firebase-admin axios
          export FIREBASE_KEY='${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          export YV_TOKEN='${{ secrets.YV_TOKEN }}'
          node run.js
